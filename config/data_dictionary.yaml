        description: "Дата оновлення"
    relationships:
      - type: "reference"
        fields: ["source", "source_id"]
        target_collection: "unified_listings"
        target_fields: ["source", "source_id"]
        description: "Зв'язок з оголошенням через source+source_id"
        cardinality: "one-to-one"

  cadastral_parcels:
    description: "Земельні ділянки з кадастру (kadastrova-karta.com)"
    mongo_collection: "cadastral_parcels"
    indexes:
      - field: "cadastral_number"
        unique: true
        description: "Унікальний кадастровий номер"
      - field: ["bounds", "2dsphere"]
        unique: false
        description: "Геопошук за кордонами"
      - field: "source_cell_id"
        unique: false
        description: "Зв'язок з коміркою сітки"
    fields:
      cadastral_number:
        type: "string"
        required: true
        description: "Номер в кадастрі"
      bounds:
        type: "object"
        required: true
        description: "GeoJSON Polygon — кордони ділянки"
      address:
        type: "string"
        required: false
        description: "Адреса ділянки (якщо вказана в кадастрі)"
      purpose:
        type: "string"
        required: false
        description: "Код призначення (01.01, 02.02 тощо)"
      purpose_label:
        type: "string"
        required: false
        description: "Текстова назва призначення"
      category:
        type: "string"
        required: false
        description: "Категорія земель"
      area_sqm:
        type: "number"
        required: false
        description: "Площа, м²"
      ownership_form:
        type: "string"
        required: false
        description: "Форма власності"
      source:
        type: "string"
        required: true
        description: "Джерело (kadastrova-karta)"
      source_cell_id:
        type: "string"
        required: false
        description: "ID комірки сітки"
      fetched_at:
        type: "datetime"
        required: true
        description: "Час збору"

  cadastral_scraper_cells:
    description: "Прогрес скрапера кадастру — комірки сітки"
    mongo_collection: "cadastral_scraper_cells"
    indexes:
      - field: "cell_id"
        unique: true
        description: "Унікальний ключ комірки"
      - field: "status"
        unique: false
        description: "Статус обробки"
    fields:
      cell_id:
        type: "string"
        required: true
        description: "Ключ комірки (zoom_lat_lon)"
      zoom:
        type: "number"
        required: true
        description: "Рівень zoom"
      bbox:
        type: "object"
        required: true
        description: "Межі комірки (min_lat, max_lat, min_lon, max_lon)"
      status:
        type: "string"
        required: true
        description: "pending, processing, done, error"
      processed_at:
        type: "datetime"
        required: false
        description: "Час обробки"
      parcels_count:
        type: "number"
        required: false
        description: "Кількість зібраних ділянок"
      error_message:
        type: "string"
        required: false
        description: "Помилка (якщо status=error)"

  cadastral_parcel_location_index:
    description: "Індекс місцезнаходження з кадастрового номера (область, район, КОАТУУ)"
    mongo_collection: "cadastral_parcel_location_index"
    indexes:
      - field: "cadastral_number"
        unique: true
        description: "Унікальний кадастровий номер"
      - field: "oblast_code"
        unique: false
        description: "Пошук за областю"
      - field: "oblast_name"
        unique: false
        description: "Пошук за назвою області"
      - field: "koatuu_prefix"
        unique: false
        description: "Пошук за префіксом КОАТУУ"
    fields:
      cadastral_number:
        type: "string"
        required: true
        description: "Кадастровий номер"
      oblast_code:
        type: "string"
        required: false
        description: "Код області (перші 2 цифри КОАТУУ)"
      oblast_name:
        type: "string"
        required: false
        description: "Назва області"
      koatuu_prefix:
        type: "string"
        required: false
        description: "Префікс КОАТУУ (10 цифр)"
      district_code:
        type: "string"
        required: false
        description: "Код району (3-5 цифр)"
      city_code:
        type: "string"
        required: false
        description: "Код міста (6-8 цифр)"
      zone:
        type: "string"
        required: false
        description: "Кадастрова зона"
      quarter:
        type: "string"
        required: false
        description: "Кадастровий квартал"
      parcel:
        type: "string"
        required: false
        description: "Номер ділянки"

  cadastral_parcel_clusters:
    description: "Кластери ділянок (спільні кордони, однакове призначення та форма власності)"
    mongo_collection: "cadastral_parcel_clusters"
    indexes:
      - field: "cluster_id"
        unique: true
        description: "Унікальний ID кластера"
      - field: "cadastral_numbers"
        unique: false
        description: "Пошук за ділянкою"
      - field: ["purpose", "ownership_form"]
        unique: false
        description: "Пошук за призначенням та власністю"
      - field: "parcel_count"
        unique: false
        description: "Кількість ділянок"
    fields:
      cluster_id:
        type: "string"
        required: true
        description: "Унікальний ідентифікатор кластера"
      cadastral_numbers:
        type: "array"
        required: true
        description: "Список кадастрових номерів"
      purpose:
        type: "string"
        required: false
        description: "Код призначення"
      purpose_label:
        type: "string"
        required: false
        description: "Назва призначення"
      ownership_form:
        type: "string"
        required: false
        description: "Форма власності"
      parcel_count:
        type: "number"
        required: true
        description: "Кількість ділянок"
      centroid:
        type: "object"
        required: false
        description: "GeoJSON Point — центр кластера"
      bounds:
        type: "object"
        required: false
        description: "GeoJSON Polygon — межі"
      total_area_sqm:
        type: "number"
        required: false
        description: "Сумарна площа, м²"

  real_estate_objects:
    description: "Об'єкти нерухомого майна (ОНМ): земельні ділянки, будівлі, приміщення. Єдина колекція з полем type."
    mongo_collection: "real_estate_objects"
    indexes:
      - field: "type"
        unique: false
        description: "Тип об'єкта (land_plot, building, premises)"
      - field: ["type", "cadastral_info.cadastral_number"]
        unique: true
        description: "Унікальність land_plot за кадастровим номером (partial)"
      - field: "address.formatted_address"
        unique: false
        description: "Пошук будівель за адресою"
      - field: "building_id"
        unique: false
        description: "Пошук приміщень за будівлею"
      - field: "source_listing_ids.source"
        unique: false
        description: "Пошук за джерелом оголошення"
    fields:
      _id:
        type: "ObjectId"
        required: true
        description: "MongoDB ObjectId"
        mongo_generated: true
      type:
        type: "string"
        required: true
        description: "Тип: land_plot, building, premises"
        enum: ["land_plot", "building", "premises"]
      description:
        type: "string"
        required: false
        description: "Короткий опис (напр. ТРЦ Гулівер, Комерційне приміщення)"
      area_sqm:
        type: "number"
        required: false
        description: "Площа в м²"
      area_by_cadastre_sqm:
        type: "number"
        required: false
        description: "Площа за кадастром (м²). Заповнюється для land_plot, якщо площа в оголошенні суттєво відрізняється (±50 м²)"
      created_at:
        type: "datetime"
        required: true
        description: "Дата створення"
      updated_at:
        type: "datetime"
        required: true
        description: "Дата оновлення"
      source_listing_ids:
        type: "array"
        required: false
        description: "Масив {source, source_id} — оголошення, з яких витягнуто об'єкт"
        item_type: "object"
      cadastral_info:
        type: "object"
        required: false
        description: "Для land_plot: cadastral_number, purpose, purpose_label, category, area_sqm, ownership_form, bounds, address"
        nested_fields:
          cadastral_number:
            type: "string"
          purpose:
            type: "string"
          purpose_label:
            type: "string"
          category:
            type: "string"
          area_sqm:
            type: "number"
          ownership_form:
            type: "string"
      building_info:
        type: "object"
        required: false
        description: "Для building: floors_above_ground, floors_below_ground, communications, total_area_sqm, known_*"
        nested_fields:
          floors_above_ground:
            type: "number"
          floors_below_ground:
            type: "number"
          communications:
            type: "array"
          total_area_sqm:
            type: "number"
          residential_area_sqm:
            type: "number"
          technical_area_sqm:
            type: "number"
          commercial_area_sqm:
            type: "number"
          known_total_sqm:
            type: "number"
          known_residential_sqm:
            type: "number"
          known_technical_sqm:
            type: "number"
          known_commercial_sqm:
            type: "number"
      building_type:
        type: "string"
        required: false
        description: "Для building: житловий будинок, торгівельний комплекс, МАФ, промислове, складське, не визначено"
      address:
        type: "object"
        required: false
        description: "Для building: region, settlement, street, building, formatted_address, coordinates"
        nested_fields:
          region:
            type: "string"
          settlement:
            type: "string"
          street:
            type: "string"
          building:
            type: "string"
          formatted_address:
            type: "string"
          coordinates:
            type: "object"
            nested_fields:
              latitude:
                type: "number"
              longitude:
                type: "number"
      premises_ids:
        type: "array"
        required: false
        description: "Для building: масив ObjectId приміщень"
        item_type: "ObjectId"
      land_plot_ids:
        type: "array"
        required: false
        description: "Для building: масив ObjectId земельних ділянок"
        item_type: "ObjectId"
      related_building_ids:
        type: "array"
        required: false
        description: "Для building: масив ObjectId пов'язаних будівель"
        item_type: "ObjectId"
      building_id:
        type: "ObjectId"
        required: false
        description: "Для premises: ID будівлі"
      floor:
        type: "number"
        required: false
        description: "Для premises: поверх"
      premises_type:
        type: "string"
        required: false
        description: "Для premises: житлове, комерційне, технічне"
      communications:
        type: "array"
        required: false
        description: "Для premises: масив комунікацій"
        item_type: "string"
      description_text:
        type: "string"
        required: false
        description: "Для premises: стан ремонту, техніка, бізнес тощо"

  price_analytics:
    description: "Зведена аналітика цін: агреговані метрики та індикатори (квартилі по містах)"
    mongo_collection: "price_analytics"
    purpose: "Зберігання агрегованих метрик (avg, std, q1–q4) за періодами (day/week/month) та індикаторів ціни (квартилі по місту за 30 днів)"
    fields:
      period_type:
        type: "string"
        description: "Тип періоду: day, week, month, indicator"
      period_key:
        type: "string"
        description: "Ключ періоду (YYYY-MM-DD, YYYY-Www, YYYY-MM, last_30_days)"
      group_source:
        type: "string"
        description: "Джерело (olx/prozorro)"
      group_property_type:
        type: "string"
        description: "Тип оголошення"
      group_region:
        type: "string"
        description: "Область"
      group_city:
        type: "string"
        description: "Місто"
      city:
        type: "string"
        description: "Місто (для period_type=indicator)"
      region:
        type: "string"
        description: "Область (для period_type=indicator)"
      metric:
        type: "string"
        description: "Метрика (price_uah, price_per_m2_uah, price_per_ha_uah)"
      q1:
        type: "number"
        description: "1-й квартиль"
      q2:
        type: "number"
        description: "Медіана (2-й квартиль)"
      q3:
        type: "number"
        description: "3-й квартиль"
      q4:
        type: "number"
        description: "4-й квартиль"
      metrics:
        type: "object"
        description: "Об'єкт метрик з avg, std, q1–q4 для кожної"
      computed_at:
        type: "datetime"
        description: "Час обчислення"

  analytics_extracts:
    description: "Виокремлені дані з оголошень для швидких агрегацій. Заповнюється під час перерахунку аналітики з unified_listings. Плоскі поля: region, city, city_district, price_per_m2_uah, price_per_ha_uah тощо."
    mongo_collection: "analytics_extracts"
    indexes:
      - field: ["source", "source_id"]
        unique: true
        description: "Унікальна комбінація джерела та ID"
      - field: ["region", "city", "city_district"]
        unique: false
        description: "Для агрегацій по району міста"
    fields:
      source:
        type: "string"
        description: "Джерело (olx, prozorro)"
      source_id:
        type: "string"
        description: "ID в джерелі"
      listing_url:
        type: "string"
        description: "Посилання на оголошення"
      property_type:
        type: "string"
        description: "Тип (земля, нерухомість)"
      source_date:
        type: "string"
        description: "Дата з джерела (YYYY-MM-DD)"
      region:
        type: "string"
        description: "Область"
      oblast_raion:
        type: "string"
        description: "Район області"
      settlement_type:
        type: "string"
        description: "Тип населеного пункту (м., с., смт.)"
      settlement:
        type: "string"
        description: "Населений пункт"
      city:
        type: "string"
        description: "Місто"
      city_district:
        type: "string"
        description: "Район міста (доповнюється геокодуванням для великих міст)"
      geocode_formatted_address:
        type: "string"
        required: false
        description: "Відформатована адреса з Google Geocoding (при доповненні)"
      geocode_latitude:
        type: "number"
        required: false
        description: "Широта з геокодування"
      geocode_longitude:
        type: "number"
        required: false
        description: "Довгота з геокодування"
      street_type:
        type: "string"
        description: "Тип вулиці"
      street:
        type: "string"
        description: "Назва вулиці"
      building:
        type: "string"
        description: "Номер будинку"
      floor:
        type: "number"
        description: "Поверх"
      land_area_sqm:
        type: "number"
        description: "Площа землі (м²). Відображення для землі: сотки = land_area_sqm/100."
      price_per_ha_uah:
        type: "number"
        description: "Ціна землі за га (грн). Відображення для землі: ціна за сотку = price_per_ha_uah/100 (грн/с)."
      price_per_ha_usd:
        type: "number"
        description: "Ціна землі за га (дол)"
      building_area_sqm:
        type: "number"
        description: "Площа нерухомості (м²)"
      price_per_m2_uah:
        type: "number"
        description: "Ціна нерухомості за м² (грн)"
      price_per_m2_usd:
        type: "number"
        description: "Ціна нерухомості за м² (дол)"

# Допоміжні типи та константи
field_types:
  - name: "string"
    description: "Рядок тексту"
    mongo_type: "string"
  - name: "number"
    description: "Число (integer або float)"
    mongo_type: "number"
  - name: "boolean"
    description: "Булеве значення"
    mongo_type: "bool"
  - name: "datetime"
    description: "Дата та час"
    mongo_type: "date"
  - name: "ObjectId"
    description: "MongoDB ObjectId"
    mongo_type: "objectId"
  - name: "object"
    description: "Вкладений об'єкт"
    mongo_type: "object"
  - name: "array"
    description: "Масив значень"
    mongo_type: "array"

# Метадані
metadata:
  version: "1.0.0"
  last_updated: "2026-01-23"
  description: "Data Dictionary для проекту Pazuzu - єдине джерело правди про структуру даних"
