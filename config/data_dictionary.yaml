            example: "1234567890:01:001:0001"
          building_area_sqm:
            type: "number"
            unit: "m²"
            description: "Площа будівлі в квадратних метрах"
          land_area_sqm:
            type: "number"
            unit: "m²"
            description: "Площа земельної ділянки в м². Для відображення в сотках: land_area_sqm/100."
          addresses:
            type: "array"
            description: "Список адрес"
            item_type: "object"
            nested_fields:
              region:
                type: "string"
                description: "Область"
                example: "Київська"
              city:
                type: "string"
                description: "Місто"
                example: "Київ"
              district:
                type: "string"
                description: "Район"
              settlement:
                type: "string"
                description: "Населений пункт"
              street:
                type: "string"
                description: "Вулиця"
              building_number:
                type: "string"
                description: "Номер будинку"
      
      created_at:
        type: "datetime"
        required: true
        description: "Дата та час створення запису"
    
    relationships:
      - type: "reference"
        field: "description_hash"
        target_collection: "prozorro_auctions"
        target_field: "description_hash"
        description: "Зв'язок з аукціонами, які мають такий самий хеш опису"
        cardinality: "one-to-many"

  olx_listings:
    description: "Колекція оголошень OLX (нежитлова нерухомість, земельні ділянки). Джерело — скрапінг пошуку OLX; ідентифікатор — url. Для фільтрації за періодом використовуй поле updated_at (BSON Date); для execute_query/save_query_to_temp_collection — filters з полями url, search_data.*, detail.*, updated_at."
    mongo_collection: "olx_listings"
    indexes:
      - field: "url"
        unique: true
        description: "Унікальний URL оголошення OLX"
      - field: "updated_at"
        unique: false
        description: "Для сортування та фільтрації за датою оновлення"
    fields:
      _id:
        type: "ObjectId"
        required: true
        description: "MongoDB ObjectId"
        mongo_generated: true
      url:
        type: "string"
        required: true
        description: "Унікальний URL оголошення на OLX; використовуй як ідентифікатор при експорті (export_listings_to_file з collection=olx_listings)"
        indexed: true
        example: "https://www.olx.ua/d/obyavlenie/..."
      search_data:
        type: "object"
        description: "Дані зі сторінки пошуку OLX (картка в списку)"
        nested_fields:
          title:
            type: "string"
            description: "Заголовок оголошення"
          price:
            type: "number"
            description: "Ціна в гривнях (число)"
          price_text:
            type: "string"
            description: "Ціна як текст (наприклад з одиницями)"
          price_value:
            type: "number"
            description: "Числове значення ціни"
          location:
            type: "string"
            description: "Локація з оголошення (рядок)"
          date_text:
            type: "string"
            description: "Текст дати публікації з сторінки"
          listed_at_iso:
            type: "string"
            description: "Дата публікації в ISO форматі (UTC)"
          area_m2:
            type: "number"
            description: "Площа в м² з картки пошуку (якщо є)"
      detail:
        type: "object"
        description: "Дані зі сторінки оголошення (деталі, опис, LLM-екстракція, геокодування)"
        nested_fields:
          description:
            type: "string"
            description: "Повний текст опису оголошення"
          llm:
            type: "object"
            description: "Структуровані дані з LLM-парсингу опису (тип нерухомості, площі)"
            nested_fields:
              property_type:
                type: "string"
                description: "Тип нерухомості (з опису)"
              building_area_sqm:
                type: "number"
                unit: "m²"
                description: "Площа будівлі/приміщень у м²"
              land_area_sqm:
                type: "number"
                unit: "m²"
                description: "Площа земельної ділянки в м². Для відображення в сотках: /100."
          resolved_locations:
            type: "array"
            description: "Результати геокодування адрес (масив об'єктів з results[].address_structured: region, city, street, street_number, formatted_address)"
            item_type: "object"
          address_refs:
            type: "array"
            description: "Посилання на топоніми з колекцій regions, cities, streets, buildings. Кожен елемент містить об'єкт з полями region, city, street, building (якщо є), де кожне поле містить _id та name."
            item_type: "object"
            nested_fields:
              region:
                type: "object"
                description: "Посилання на область"
                nested_fields:
                  _id:
                    type: "string"
                    description: "ID області з колекції regions"
                  name:
                    type: "string"
                    description: "Назва області"
              city:
                type: "object"
                description: "Посилання на місто"
                nested_fields:
                  _id:
                    type: "string"
                    description: "ID міста з колекції cities"
                  name:
                    type: "string"
                    description: "Назва міста"
              street:
                type: "object"
                description: "Посилання на вулицю (опціонально)"
                nested_fields:
                  _id:
                    type: "string"
                    description: "ID вулиці з колекції streets"
                  name:
                    type: "string"
                    description: "Назва вулиці"
                  street_type:
                    type: "string"
                    description: "Тип вулиці"
              building:
                type: "object"
                description: "Посилання на будинок (опціонально)"
                nested_fields:
                  _id:
                    type: "string"
                    description: "ID будинку з колекції buildings"
                  number:
                    type: "string"
                    description: "Номер будинку"
                  building_part:
                    type: "string"
                    description: "Частина будинку"
          parameters:
            type: "array"
            description: "Параметри оголошення з сторінки (масив {label, value}); для типу нерухомості — label містить 'тип' або 'призначення'"
            item_type: "object"
      created_at:
        type: "datetime"
        description: "Дата створення запису в БД (BSON Date)"
      updated_at:
        type: "datetime"
        description: "Дата останнього оновлення запису в БД. Для фільтра за періодом використовуй updated_at з операторами $gte, $lte; значення — BSON Date або ISO-рядок (залежно від збереження). При execute_query для olx_listings можна фільтрувати за 'updated_at': {$gte: ISODate(...), $lte: ISODate(...)} або порівняння рядків ISO."
      is_active:
        type: "boolean"
        description: "Чи оголошення активне (не зняте з публікації). False — зняте з пошуку OLX за період. За замовчуванням True."
    
    # Поля для запитів та експорту (агент використовує ці шляхи)
    flattened_fields:
      url:
        type: "string"
        description: "Ідентифікатор оголошення; для експорту передавай список url у export_listings_to_file(ids=..., collection=olx_listings)"
        usage: "Фільтр за url; ідентифікатор для експорту"
      updated_at:
        type: "datetime"
        description: "Дата оновлення запису. Фільтр за періодом: updated_at з $gte/$lte (BSON Date або ISO рядок)"
        usage: "Фільтрація за періодом (звіт за добу, за тиждень)"
      search_data_title:
        type: "string"
        source: "search_data.title"
        description: "Заголовок оголошення"
      search_data_price:
        type: "number"
        source: "search_data.price"
        description: "Ціна (UAH)"
      search_data_location:
        type: "string"
        source: "search_data.location"
        description: "Локація з картки"
      detail_llm_property_type:
        type: "string"
        source: "detail.llm.property_type"
        description: "Тип нерухомості з LLM-парсингу"
      detail_llm_building_area_sqm:
        type: "number"
        source: "detail.llm.building_area_sqm"
        description: "Площа будівлі (м²)"
      detail_llm_land_area_sqm:
        type: "number"
        source: "detail.llm.land_area_sqm"
        description: "Площа ділянки (м²). Для відображення в сотках: /100."
      detail_llm_tags:
        type: "array"
        source: "detail.llm.tags"
        description: "Масив тегів для фільтрації: призначення (крамниця, аптека, офіс, склад, кафе тощо) та комунікації (газ, вода, електрика, каналізація, опалення тощо). Формується агентом-інтерпретатором при парсингу опису. Фільтр: detail.llm.tags з $in. Унікальні значення — get_distinct_values(collection, detail.llm.tags, unwrap_array=true)."

  unified_listings:
