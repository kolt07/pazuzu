# Офіційний конфіг RabbitMQ (образ rabbitmq:4-management).
#
# За замовчуванням (з 3.12+) брокер закриває канал, якщо споживач не надіслав ACK
# за consumer_timeout — для Celery з task_acks_late це означає «задача довша за таймаут».
# Джерело: https://www.rabbitmq.com/docs/consumers#acknowledgement-timeout
#
# Значення в мілісекундах. 86400000 = 24 год.
consumer_timeout = 86400000
